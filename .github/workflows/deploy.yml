name: Deploy

on:
  workflow_run:
    workflows: ["Quality Check"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloudflare Workers (production)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.repository == 'FrkAk/piyaz'
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
    environment:
      name: production
      url: https://app.piyaz.ai
    steps:
      - name: Checkout the commit that passed Quality Check
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules/.cache
            .next/cache
          key: deploy-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deploy-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Cloudflare Workers (production)
        env:
          DEPLOY_TARGET: cloudflare
          BETTER_AUTH_URL: https://app.piyaz.ai
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:cf
