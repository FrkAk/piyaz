name: Deploy

# Production is release-gated, not push-gated: publishing a GitHub Release
# (cut from an already-CI-passed main commit) runs the prod migration then
# deploys the Worker, inside the `production` Environment whose required
# reviewers make a human approve every prod DDL + deploy. The migrate runs
# BEFORE the deploy and the deploy only runs if migrate succeeds.
on:
  release:
    types: [published]

jobs:
  deploy:
    name: Migrate + deploy to Cloudflare Workers (production)
    runs-on: ubuntu-latest
    if: github.repository == 'FrkAk/piyaz'
    # Serialize prod deploys so two migrations never overlap; __drizzle_migrations
    # orders them and makes re-runs idempotent.
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
    environment:
      name: production
      url: https://app.piyaz.ai
    steps:
      # The release trigger accepts any tag; require the released commit to be
      # contained in main so a tag cut off an unmerged/never-CI'd commit cannot
      # migrate and deploy prod.
      - name: Assert the released tag is on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(gh api "repos/${{ github.repository }}/compare/main...${{ github.event.release.tag_name }}" --jq '.status')
          if [ "$status" != "identical" ] && [ "$status" != "behind" ]; then
            echo "::error::Released tag ${{ github.event.release.tag_name }} is not contained in main (compare status: $status). Refusing to deploy."
            exit 1
          fi

      - name: Checkout the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Migrate + deploy
        uses: ./.github/actions/deploy-worker
        with:
          migration_url: ${{ secrets.DATABASE_MIGRATION_URL_PROD }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          better_auth_url: https://app.piyaz.ai
          deploy_script: deploy:cf
          cache_prefix: deploy
