name: Deploy

# Production is release-gated, not push-gated: publishing a GitHub Release
# (cut from an already-CI-passed main commit) runs the prod migration then
# deploys the Worker, inside the `production` Environment whose required
# reviewers make a human approve every prod DDL + deploy. The migrate runs
# BEFORE the deploy and the deploy only runs if migrate succeeds.
on:
  release:
    types: [published]

jobs:
  deploy:
    name: Migrate + deploy to Cloudflare Workers (production)
    runs-on: ubuntu-latest
    if: github.repository == 'FrkAk/piyaz'
    # Serialize prod deploys so two migrations never overlap; __drizzle_migrations
    # orders them and makes re-runs idempotent.
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
    environment:
      name: production
      url: https://app.piyaz.ai
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules/.cache
            .next/cache
          key: deploy-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deploy-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Migrations run as the dedicated `migrator` role (owns public + drizzle,
      # isolated from the app's service_role) over the DIRECT (unpooled) Neon host.
      # If this step fails the job stops and the Worker is NOT deployed.
      - name: Migrate production database
        env:
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_URL_PROD }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare Workers (production)
        env:
          DEPLOY_TARGET: cloudflare
          BETTER_AUTH_URL: https://app.piyaz.ai
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:cf
