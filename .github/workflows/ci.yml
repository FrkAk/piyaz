name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Full suite runs on PRs (the merge gate). Push to main runs only the smoke
# steps; the heavy DB tests + schema-drift already passed on the up-to-date PR
# and stay a net for admin-bypassed merges. Superseded PR runs are cancelled.
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: piyaz
          POSTGRES_PASSWORD: piyaz
          POSTGRES_DB: piyaz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U piyaz -d piyaz_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        if: github.actor != 'dependabot[bot]'
      - name: Install dependencies (Dependabot)
        run: bun install
        if: github.actor == 'dependabot[bot]'
      - name: Audit dependencies
        # GHSA-gv7w-rqvm-qjhr: esbuild Deno-installer integrity flaw; not
        # exploitable here (bun installs from the committed lockfile). Drop
        # the ignore once wrangler / drizzle-kit / @opennextjs pull
        # esbuild >= 0.28.1.
        # GHSA-96hv-2xvq-fx4p: ws DoS via tiny fragments. Dev-only (wrangler
        # > miniflare), never shipped to the deployed Worker. No upstream fix:
        # miniflare pins ws@8.20.1 exactly, even in the latest wrangler. Drop
        # the ignore once miniflare bumps ws >= 8.21.0. (form-data + hono are
        # fixed via package.json overrides; see the //overrides note there.)
        run: bun audit --audit-level=high --ignore=GHSA-gv7w-rqvm-qjhr --ignore=GHSA-96hv-2xvq-fx4p
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -Pq '^(feat|fix|chore|docs|refactor|test|ci|perf|style|build|revert)(\(.+\))?!?: .+'; then
            echo "::error::PR title must follow conventional commits: <type>: <description>"
            echo "  Types: feat, fix, chore, docs, refactor, test, ci, perf, style, build, revert"
            echo "  Examples: 'feat: add task graph', 'fix(ai): rate limiter timing'"
            exit 1
          fi
      - name: Format check
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Schema drift gate
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
        env:
          # db:generate is offline (diffs schema.ts against the committed
          # snapshot); this URL only satisfies drizzle.config's presence check.
          DATABASE_SERVICE_ROLE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
        run: |
          bun run db:generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "::error::lib/db/schema.ts changed without a committed migration. Run 'bun run db:generate' and commit the drizzle/ changes."
            git --no-pager diff -- drizzle
            git status --porcelain drizzle
            exit 1
          fi
      - name: Test
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
        env:
          TEST_DATABASE_URL: postgres://piyaz:piyaz@localhost:5432/piyaz_test
        run: bun run test
      - name: Check plugin drift
        run: bun run check:plugins
