name: Migrate and deploy Worker
description: >-
  Migrate the target Neon database as the dedicated migrator role, then build
  and deploy the Worker. Shared by the dev (deploy-dev.yml) and production
  (deploy.yml) workflows; the caller job owns the Environment, trigger,
  concurrency, and checkout ref.

inputs:
  migration_url:
    description: migrator-role DIRECT (unpooled) Neon URL for db:migrate.
    required: true
  cloudflare_api_token:
    description: Cloudflare API token for the Worker deploy.
    required: true
  cloudflare_account_id:
    description: Cloudflare account id.
    required: true
  better_auth_url:
    description: Public base URL bound as BETTER_AUTH_URL for the build/deploy.
    required: true
  deploy_script:
    description: package.json script that builds and deploys (deploy:cf | deploy:cf:dev).
    required: true
  cache_prefix:
    description: Prefix for the build-artefact cache key.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24.18.0'

    - name: Cache build artefacts
      uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          node_modules/.cache
          .next/cache
        key: ${{ inputs.cache_prefix }}-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ inputs.cache_prefix }}-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    # Migrations run as the dedicated `migrator` role (owns public + drizzle,
    # isolated from the app's service_role) over the DIRECT (unpooled) Neon
    # host. If this step fails the job stops and the Worker is NOT deployed.
    - name: Migrate database
      shell: bash
      env:
        DATABASE_MIGRATION_URL: ${{ inputs.migration_url }}
      run: bun run db:migrate

    # Re-apply the public-schema RLS (grants + policies) as the migration role,
    # which owns `public`. piyaz_auth grants + SECURITY DEFINER helpers need the
    # owner role and are applied out-of-band, never in CI.
    - name: Apply public RLS
      shell: bash
      env:
        DATABASE_MIGRATION_URL: ${{ inputs.migration_url }}
      run: bun run db:rls:ci

    # Fail the deploy (read-only catalog check) if the live database is missing
    # any expected policy, FORCE flag, or owner-managed function — e.g. a
    # forgotten owner apply for a new SECURITY DEFINER helper.
    - name: Verify RLS
      shell: bash
      env:
        DATABASE_MIGRATION_URL: ${{ inputs.migration_url }}
      run: bun run db:rls:verify

    - name: Build and deploy Worker
      shell: bash
      env:
        DEPLOY_TARGET: cloudflare
        BETTER_AUTH_URL: ${{ inputs.better_auth_url }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
      run: bun run ${{ inputs.deploy_script }}
